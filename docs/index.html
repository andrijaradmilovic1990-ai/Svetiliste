      databaseURL:       "https://budzet-6e6af-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "budzet-6e6af",
      storageBucket:     "budzet-6e6af.firebasestorage.app",
      messagingSenderId: "952332899725",
      appId:             "1:952332899725:web:776976552ea0dcc126d9c4",
      measurementId:     "G-PE3CYZS970"
    };
  </script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d0d0d; font-family:'Georgia',serif; }
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; }
    input[type=number] { -moz-appearance:textfield; }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:#0d0d0d; }
    ::-webkit-scrollbar-thumb { background:#2a2a2a; border-radius:2px; }

<body>
  <div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Firebase init ──────────────────────────────────────────────────
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();
const budzetRef = db.ref("budzet-data");

// ── Konstante ──────────────────────────────────────────────────────
const NEDELJE       = ["Prva nedelja","Druga nedelja","Treća nedelja","Četvrta nedelja"];
const OSTALE        = ["Nepredviđeni troškovi","Dodatne stvari","Računi","Štednja"];
const FASCIKLE      = [...NEDELJE,...OSTALE];
const OSTATAK_FASC  = NEDELJE.map(n=>`Ostatak - ${n}`);
const SVE_FASCIKLE  = [...FASCIKLE,...OSTATAK_FASC];

const BOJE = {
  "Prva nedelja":"#c8a96e","Druga nedelja":"#c8a96e",
  "Treća nedelja":"#c8a96e","Četvrta nedelja":"#c8a96e",
  "Nepredviđeni troškovi":"#e08070","Dodatne stvari":"#a07bbf",
  "Računi":"#6e9fc8","Štednja":"#7eb8a4",
  "Ostatak - Prva nedelja":"#5a4a2a","Ostatak - Druga nedelja":"#5a4a2a",
  "Ostatak - Treća nedelja":"#5a4a2a","Ostatak - Četvrta nedelja":"#5a4a2a",
};

const MESECI = ["Jan","Feb","Mar","Apr","Maj","Jun","Jul","Avg","Sep","Okt","Nov","Dec"];
const fmt    = n => new Intl.NumberFormat("sr-RS").format(Math.round(n||0))+" RSD";
const mkKey  = d => `${d.getFullYear()}-${d.getMonth()}`;
const mkLabel= key => { const [y,m]=key.split("-").map(Number); return `${MESECI[m]} ${y}`; };
const mkEmpty= () => ({
  prihodi: [],
  raspored: Object.fromEntries(SVE_FASCIKLE.map(f=>[f,0])),
  rashod:   Object.fromEntries(SVE_FASCIKLE.map(f=>[f,0])),
  transakcije:[],
  zatvoreneNedelje:[]
});

const S = {
  inp:{ width:"100%",background:"#1c1c1c",border:"1px solid #2a2a2a",color:"#e8e0d0",
        borderRadius:6,padding:"9px 12px",fontSize:13,outline:"none",boxSizing:"border-box" },
};

// ── UI komponente ──────────────────────────────────────────────────
function Modal({ title, titleColor="#c8a96e", onClose, children }) {
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",
        display:"flex",alignItems:"flex-end",zIndex:200}}>
      <div onClick={e=>e.stopPropagation()}
          style={{width:"100%",background:"#131313",borderRadius:"14px 14px 0 0",
                  padding:"22px 18px 32px",border:"1px solid #252525",
                  maxHeight:"88vh",overflowY:"auto"}}>
        <div style={{fontSize:15,color:titleColor,marginBottom:16,fontWeight:"bold"}}>{title}</div>
        {children}
      </div>
    </div>
  );
}

function Btns({ onCancel, onOk, okLabel, okColor="#c8a96e" }) {
  return (
    <div style={{display:"flex",gap:8,marginTop:18}}>
      <button onClick={onCancel}
          style={{flex:1,padding:"10px",background:"#1e1e1e",border:"none",color:"#555",
                  borderRadius:6,cursor:"pointer",fontSize:13}}>Odustani</button>
      <button onClick={onOk}
          style={{flex:1,padding:"10px",background:okColor,border:"none",color:"#0f0f0f",
                  borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:"bold"}}>{okLabel}</button>
    </div>
  );
}

// ── Sync indikator ─────────────────────────────────────────────────
function SyncDot({ status }) {
  const color = status==="ok"?"#7eb8a4":status==="saving"?"#c8a96e":"#e08070";
  const label = status==="ok"?"Sinhronizovano":status==="saving"?"Čuvanje...":"Greška veze";
  return (
    <div style={{display:"flex",alignItems:"center",gap:5}}>
      <div style={{width:6,height:6,borderRadius:"50%",background:color,
                   boxShadow:status==="saving"?`0 0 6px ${color}`:"none",
                   transition:"background 0.3s"}} />
      <span style={{fontSize:9,color:color,letterSpacing:1}}>{label}</span>
    </div>
  );
}

// ── Glavna aplikacija ──────────────────────────────────────────────
function App() {
  const today = new Date();
  const [key,    setKey]    = useState(mkKey(today));
  const [data,   setData]   = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [sync,   setSync]   = useState("ok"); // "ok" | "saving" | "error"
  const [view,   setView]   = useState("pregled");

  const [showRaspored,    setShowRaspored]    = useState(false);
  const [showDodajPrihod, setShowDodajPrihod] = useState(false);
  const [showTx,          setShowTx]          = useState(false);
  const [showPrebaci,     setShowPrebaci]     = useState(false);
  const [showZatvori,     setShowZatvori]     = useState(null);
  const [showOstatci,     setShowOstatci]     = useState(false);
  const [showDelete,      setShowDelete]      = useState(null);

  const [newPrihod, setNewPrihod] = useState({ iznos: '', ko: 'Andrija' });
  const [tempR,     setTempR]     = useState({});
  const [tx,        setTx]        = useState({ opis:"", iznos:"", f:FASCIKLE[0] });
  const [preb,      setPreb]      = useState({ f:FASCIKLE[0], iznos:"" });


  const isSaving = useRef(false);

  // Prijavi se na Firebase i slušaj promene u realnom vremenu
  useEffect(() => {
    const unsub = budzetRef.on("value", snapshot => {
      const val = snapshot.val();
      if (val && val.data) {
        if (!isSaving.current) {
          setData(val.data);
          if (val.key) setKey(val.key);
        }
      } else if (!loaded) {
        setData({ [mkKey(today)]: mkEmpty() });
      }
      setLoaded(true);
    }, err => {
      console.error("Firebase greška:", err);
      if (!loaded) {
        setData({ [mkKey(today)]: mkEmpty() });
        setLoaded(true);
      }
      setSync("error");
    });
    return () => budzetRef.off("value", unsub);
  }, []);

  // Čuvaj u Firebase kad se data promeni
  useEffect(() => {
    if (!loaded || !data) return;
    isSaving.current = true;
    setSync("saving");
    const timer = setTimeout(() => {
      budzetRef.set({ data, key })
        .then(() => { setSync("ok"); isSaving.current = false; })
        .catch(() => { setSync("error"); isSaving.current = false; });
    }, 600); // debounce 600ms
    return () => clearTimeout(timer);
  }, [data, key, loaded]);


  if (!loaded || !data) return (
    <div style={{minHeight:"100vh",background:"#0d0d0d",display:"flex",
                 alignItems:"center",justifyContent:"center",color:"#555",fontFamily:"Georgia,serif"}}>
      Učitavanje...
    </div>
  );

  const mesec = data[key] || mkEmpty();

  function updateMesec(fn) {
    setData(p => {
      const m = p[key] || mkEmpty();
      return { ...p, [key]: fn(m) };
    });
  }

  function nav(dir) {
    const [y,m] = key.split("-").map(Number);
    const d = new Date(y, m+dir, 1);
    const k = mkKey(d);
    setData(p => ({ ...p, [k]: p[k] || mkEmpty() }));
    setKey(k);
  }

  function openRaspored() {
    setTempR({ ...mesec.raspored });
    setShowRaspored(true);
  }

  function saveRaspored() {
    const raspored = { ...mesec.raspored };
    FASCIKLE.forEach(f => { raspored[f] = parseFloat(tempR[f])||0; });
    updateMesec(m => ({ ...m, raspored }));
    setShowRaspored(false);
  }

  function addPrihod() {
    const iznos = parseFloat(newPrihod.iznos);
    if (!iznos) return;
    const prihod = { iznos, ko: newPrihod.ko, datum: new Date().toLocaleDateString("sr-RS") };
    updateMesec(m => ({ ...m, prihodi: [...(m.prihodi||[]), prihod] }));
    setNewPrihod({ iznos: '', ko: 'Andrija' });
    setShowDodajPrihod(false);
    setTempR({ ...mesec.raspored });
    setShowRaspored(true);
  }

  function obrisiPrihod(idx) {
    updateMesec(m => ({ ...m, prihodi: (m.prihodi||[]).filter((_,i)=>i!==idx) }));
  }

  function addTx() {
    const iznos = parseFloat(tx.iznos);
    if (!iznos || !tx.opis) return;
    updateMesec(m => ({
      ...m,
      rashod: { ...m.rashod, [tx.f]:(m.rashod[tx.f]||0)+iznos },
      transakcije: [{ opis:tx.opis, iznos, f:tx.f,
                      ko:tx.ko||"", datum:new Date().toLocaleDateString("sr-RS") },
                    ...m.transakcije]
    }));
    setTx({ opis:"", iznos:"", f:FASCIKLE[0], ko:"" });
    setShowTx(false);
  }

  function deleteTx(idx) {
    const t = mesec.transakcije[idx];
    updateMesec(m => ({
      ...m,
      rashod: { ...m.rashod, [t.f]: Math.max(0,(m.rashod[t.f]||0)-t.iznos) },
      transakcije: m.transakcije.filter((_,i)=>i!==idx)
    }));
    setShowDelete(null);
  }

  function doPrebaciNaStranu() {
    const iznos = parseFloat(preb.iznos);
    if (!iznos) return;
    const ostatak = (mesec.raspored[preb.f]||0)-(mesec.rashod[preb.f]||0);
    if (iznos > ostatak) return;
    updateMesec(m => ({
      ...m,
      rashod: { ...m.rashod, [preb.f]:(m.rashod[preb.f]||0)+iznos },
      raspored: { ...m.raspored, "Štednja":(m.raspored["Štednja"]||0)+iznos },
      transakcije: [{ opis:`Na stranu iz: ${preb.f}`, iznos, f:"Štednja",
                      datum:new Date().toLocaleDateString("sr-RS") },
                    ...m.transakcije]
    }));
    setPreb({ f:FASCIKLE[0], iznos:"" });
    setShowPrebaci(false);
  }

  function zatvoriNedelju(nedelja) {
    const rsp = mesec.raspored[nedelja]||0;
    const rsh = mesec.rashod[nedelja]||0;
    const ostatak = rsp - rsh;
    const ostatakF = `Ostatak - ${nedelja}`;
    if (ostatak <= 0) {
      updateMesec(m=>({...m,zatvoreneNedelje:[...(m.zatvoreneNedelje||[]),nedelja]}));
      setShowZatvori(null); return;
    }
    updateMesec(m => ({
      ...m,
      rashod: { ...m.rashod, [nedelja]:rsp },
      raspored: { ...m.raspored, [ostatakF]:(m.raspored[ostatakF]||0)+ostatak },
      zatvoreneNedelje: [...(m.zatvoreneNedelje||[]),nedelja],
      transakcije: [{ opis:`Zatvorena ${nedelja} — ostatak prebačen`,
                      iznos:ostatak, f:ostatakF, datum:new Date().toLocaleDateString("sr-RS") },
                    ...m.transakcije]
    }));
    setShowZatvori(null);
  }

  const ukupnaPlata    = (mesec.prihodi?.length > 0)
    ? mesec.prihodi.reduce((a,p)=>a+(p.iznos||0),0)
    : (mesec.plata||0); // backward compat
  const ukupnoRaspored = FASCIKLE.reduce((a,f)=>a+(mesec.raspored[f]||0),0);
  const nerasporedj    = ukupnaPlata - ukupnoRaspored;
  const imaOstataka    = OSTATAK_FASC.some(f=>(mesec.raspored[f]||0)>0);

  return (
    <div style={{minHeight:"100vh",background:"#0d0d0d",color:"#e8e0d0",
                 fontFamily:"'Georgia',serif",display:"flex",flexDirection:"column"}}>

      {/* ── Header ── */}
      <div style={{padding:"12px 18px",borderBottom:"1px solid #1e1e1e",
                   display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:10,letterSpacing:3,color:"#444",textTransform:"uppercase"}}>Andrija &amp; Katarina</div>
          <div style={{fontSize:18,color:"#c8a96e",fontWeight:"bold"}}>Kućni budžet</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <button onClick={()=>nav(-1)} style={{background:"transparent",border:"1px solid #2a2a2a",color:"#777",borderRadius:4,width:26,height:26,cursor:"pointer",fontSize:15}}>‹</button>
            <span style={{fontSize:12,color:"#888",minWidth:64,textAlign:"center"}}>{mkLabel(key)}</span>
            <button onClick={()=>nav(1)} style={{background:"transparent",border:"1px solid #2a2a2a",color:"#777",borderRadius:4,width:26,height:26,cursor:"pointer",fontSize:15}}>›</button>
          </div>
          <SyncDot status={sync} />
        </div>
      </div>

      {/* ── Tabs ── */}
      <div style={{display:"flex",borderBottom:"1px solid #1a1a1a"}}>
        {[["pregled","Pregled"],["transakcije","Transakcije"]].map(([v,l])=>(
          <button key={v} onClick={()=>setView(v)}
              style={{flex:1,padding:"10px 0",background:"transparent",border:"none",
                      color:view===v?"#c8a96e":"#3a3a3a",fontSize:11,letterSpacing:2,
                      textTransform:"uppercase",cursor:"pointer",
                      borderBottom:view===v?"2px solid #c8a96e":"2px solid transparent"}}>{l}</button>
        ))}
      </div>

      <div style={{flex:1,overflow:"auto",padding:"16px",paddingBottom:"70px"}}>

        {/* ══ PREGLED ══ */}
        {view==="pregled" && (
          <div>
            {/* Prihodi kartica */}
            <div style={{background:"#161616",border:"1px solid #222",borderRadius:10,padding:"14px 16px",marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:10,color:"#444",letterSpacing:2,textTransform:"uppercase"}}>Ukupni prihodi</div>
                  <div style={{fontSize:26,color:"#c8a96e",fontWeight:"bold",marginTop:2}}>{fmt(ukupnaPlata)}</div>
                  {(mesec.prihodi||[]).map((p,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:5}}>
                      <span style={{fontSize:11,color:"#666"}}>{p.ko} · {p.datum}</span>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:11,color:"#888"}}>{fmt(p.iznos)}</span>
                        <button onClick={()=>obrisiPrihod(i)}
                            style={{background:"transparent",border:"none",color:"#3a3a3a",cursor:"pointer",fontSize:12,padding:"0 2px"}}>×</button>
                      </div>
                    </div>
                  ))}
                  {ukupnaPlata>0 && nerasporedj!==0 && (
                    <div style={{fontSize:11,color:nerasporedj>0?"#7eb8a4":"#e08070",marginTop:6}}>
                      {nerasporedj>0?`+${fmt(nerasporedj)} neraspoređeno`:`${fmt(Math.abs(nerasporedj))} previše`}
                    </div>
                  )}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6,marginLeft:12}}>
                  <button onClick={()=>setShowDodajPrihod(true)}
                      style={{background:"#c8a96e",border:"none",color:"#0d0d0d",borderRadius:7,
                              padding:"8px 12px",cursor:"pointer",fontSize:11,fontWeight:"bold",whiteSpace:"nowrap"}}>
                    + Prihod
                  </button>
                  {ukupnaPlata>0 && (
                    <button onClick={openRaspored}
                        style={{background:"transparent",border:"1px solid #2a2a2a",color:"#888",borderRadius:7,
                                padding:"7px 12px",cursor:"pointer",fontSize:11,whiteSpace:"nowrap"}}>
                      Rasporedi
                    </button>
                  )}
                </div>
              </div>
            </div>

            {/* Nedelje */}
            <div style={{fontSize:10,color:"#444",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Nedelje</div>
            {NEDELJE.map(f=>{
              const rsp=mesec.raspored[f]||0, rsh=mesec.rashod[f]||0, ost=rsp-rsh;
              const pct=rsp>0?Math.min((rsh/rsp)*100,100):0;
              const zatvorena=(mesec.zatvoreneNedelje||[]).includes(f);
              return (
                <div key={f} style={{background:"#161616",border:`1px solid ${zatvorena?"#1a1a1a":"#1e1e1e"}`,
                                     borderRadius:8,padding:"11px 14px",marginBottom:7,opacity:zatvorena?0.5:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,alignItems:"center"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:7,height:7,borderRadius:"50%",background:zatvorena?"#333":"#c8a96e"}} />
                      <span style={{fontSize:13,color:zatvorena?"#555":"#e8e0d0"}}>{f}</span>
                      {zatvorena&&<span style={{fontSize:9,color:"#444",letterSpacing:1}}>ZATVORENA</span>}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:13,fontWeight:"bold",color:ost<0?"#e08070":zatvorena?"#444":"#e8e0d0"}}>{fmt(ost)}</span>
                      {!zatvorena&&(
                        <button onClick={()=>setShowZatvori(f)}
                            style={{background:"#1e1e1e",border:"1px solid #2a2a2a",color:"#888",
                                    borderRadius:4,padding:"3px 7px",cursor:"pointer",fontSize:10}}>Zatvori</button>
                      )}
                    </div>
                  </div>
                  <div style={{height:3,background:"#242424",borderRadius:2}}>
                    <div style={{height:"100%",width:`${pct}%`,background:zatvorena?"#333":"#c8a96e",borderRadius:2}} />
                  </div>
                  <div style={{fontSize:10,color:"#3a3a3a",marginTop:4}}>{fmt(rsh)} / {fmt(rsp)}</div>
                </div>
              );
            })}

            {/* Ostatci nedelja */}
            {imaOstataka && (
              <>
                <button onClick={()=>setShowOstatci(v=>!v)}
                    style={{background:"transparent",border:"none",color:"#5a4a2a",
                            fontSize:11,letterSpacing:2,textTransform:"uppercase",
                            cursor:"pointer",marginBottom:8,padding:0}}>
                  {showOstatci?"▾":"▸"} Ostatci nedelja
                </button>
                {showOstatci && OSTATAK_FASC.filter(f=>(mesec.raspored[f]||0)>0).map(f=>{
                  const ost=(mesec.raspored[f]||0)-(mesec.rashod[f]||0);
                  return (
                    <div key={f} style={{background:"#111",border:"1px solid #1a1a1a",borderRadius:8,padding:"10px 14px",marginBottom:6}}>
                      <div style={{display:"flex",justifyContent:"space-between"}}>
                        <span style={{fontSize:12,color:"#666"}}>{f}</span>
                        <span style={{fontSize:12,color:"#5a4a2a",fontWeight:"bold"}}>{fmt(ost)}</span>
                      </div>
                    </div>
                  );
                })}
              </>
            )}

            {/* Fondovi */}
            <div style={{fontSize:10,color:"#444",letterSpacing:2,textTransform:"uppercase",margin:"12px 0 8px"}}>Fondovi</div>
            {OSTALE.map(f=>{
              const rsp=mesec.raspored[f]||0, rsh=mesec.rashod[f]||0, ost=rsp-rsh;
              const pct=rsp>0?Math.min((rsh/rsp)*100,100):0;
              return (
                <div key={f} style={{background:"#161616",border:"1px solid #1e1e1e",borderRadius:8,padding:"11px 14px",marginBottom:7}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:7,height:7,borderRadius:"50%",background:BOJE[f]}} />
                      <span style={{fontSize:13}}>{f}</span>
                    </div>
                    <span style={{fontSize:13,fontWeight:"bold",color:ost<0?"#e08070":"#e8e0d0"}}>{fmt(ost)}</span>
                  </div>
                  <div style={{height:3,background:"#242424",borderRadius:2}}>
                    <div style={{height:"100%",width:`${pct}%`,background:BOJE[f],borderRadius:2}} />
                  </div>
                  <div style={{fontSize:10,color:"#3a3a3a",marginTop:4}}>{fmt(rsh)} / {fmt(rsp)}</div>
                </div>
              );
            })}

          </div>
        )}

        {/* ══ TRANSAKCIJE ══ */}
        {view==="transakcije" && (
          <div>
            <button onClick={()=>setShowTx(true)}
                style={{width:"100%",padding:"10px",background:"#c8a96e",border:"none",color:"#0d0d0d",
                        borderRadius:7,cursor:"pointer",fontSize:12,fontWeight:"bold",marginBottom:14}}>+ Novi rashod</button>
            {(mesec.transakcije||[]).length===0
              ? <div style={{color:"#333",fontSize:13}}>Nema transakcija za {mkLabel(key)}.</div>
              : (mesec.transakcije||[]).map((t,i)=>(
                <div key={i} onClick={()=>setShowDelete(i)}
                    style={{background:"#161616",border:"1px solid #1e1e1e",borderRadius:8,
                            padding:"11px 14px",marginBottom:7,
                            display:"flex",justifyContent:"space-between",alignItems:"center",
                            cursor:"pointer"}}>
                  <div>
                    <div style={{fontSize:13}}>{t.opis}</div>
                    <div style={{fontSize:10,color:"#3a3a3a",marginTop:2}}>
                      {t.datum} · {t.f}{t.ko?` · ${t.ko}`:""}
                    </div>
                  </div>
                  <div style={{color:"#e08070",fontWeight:"bold",fontSize:13}}>-{fmt(t.iznos)}</div>
                </div>
              ))
            }
          </div>
        )}

      </div>

      {/* ── Bottom bar ── */}
      {view==="pregled" && (
        <div style={{position:"fixed",bottom:0,left:0,right:0,display:"flex",gap:8,
                     padding:"10px 16px 20px",background:"#0d0d0d",borderTop:"1px solid #1a1a1a"}}>
          <button onClick={()=>setShowPrebaci(true)}
              style={{flex:1,padding:"12px",background:"#161616",border:"1px solid #222",
                      color:"#7eb8a4",borderRadius:7,cursor:"pointer",fontSize:13}}>Na stranu</button>
          <button onClick={()=>setShowTx(true)}
              style={{flex:1,padding:"12px",background:"#c8a96e",border:"none",color:"#0d0d0d",
                      borderRadius:7,cursor:"pointer",fontSize:13,fontWeight:"bold"}}>+ Rashod</button>
        </div>
      )}

      {/* ══ MODALI ══ */}

      {/* Dodaj prihod */}
      {showDodajPrihod && (
        <Modal title="Dodaj prihod" onClose={()=>setShowDodajPrihod(false)}>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            {['Andrija','Katarina'].map(ko=>(
              <button key={ko} onClick={()=>setNewPrihod(p=>({...p,ko}))}
                  style={{flex:1,padding:"10px",
                          background:newPrihod.ko===ko?"#c8a96e":"#1e1e1e",
                          border:`1px solid ${newPrihod.ko===ko?"#c8a96e":"#2a2a2a"}`,
                          color:newPrihod.ko===ko?"#0d0d0d":"#666",
                          borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:"bold"}}>
                {ko}
              </button>
            ))}
          </div>
          <input value={newPrihod.iznos} onChange={e=>setNewPrihod(p=>({...p,iznos:e.target.value}))}
              type="number" placeholder="Iznos (RSD)" style={S.inp} autoFocus />
          <div style={{fontSize:11,color:"#555",marginTop:8}}>
            Posle dodavanja, odmah možeš da rasporediš.
          </div>
          <Btns onCancel={()=>setShowDodajPrihod(false)} onOk={addPrihod} okLabel="Dodaj i rasporedi" />
        </Modal>
      )}

      {/* Rasporedi */}
      {showRaspored && (
        <Modal title={`Raspored — ukupno ${fmt(ukupnaPlata)}`} onClose={()=>setShowRaspored(false)}>
          {nerasporedj!==0 && ukupnaPlata>0 && (
            <div style={{fontSize:11,color:nerasporedj>0?"#7eb8a4":"#e08070",marginBottom:12}}>
              {nerasporedj>0?`Neraspoređeno: ${fmt(nerasporedj)}`:`Previše za: ${fmt(Math.abs(nerasporedj))}`}
            </div>
          )}
          <div style={{fontSize:10,color:"#555",letterSpacing:2,textTransform:"uppercase",margin:"14px 0 8px"}}>Nedelje</div>
          {NEDELJE.map(f=>(
            <div key={f} style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:"#c8a96e",flexShrink:0}} />
              <span style={{fontSize:12,width:148,flexShrink:0,color:"#aaa"}}>{f}</span>
              <input value={tempR[f]||""} onChange={e=>setTempR(p=>({...p,[f]:e.target.value}))}
                  type="number" placeholder="0" style={{...S.inp,flex:1,padding:"6px 10px"}} />
            </div>
          ))}
          <div style={{fontSize:10,color:"#555",letterSpacing:2,textTransform:"uppercase",margin:"14px 0 8px"}}>Fondovi</div>
          {OSTALE.map(f=>(
            <div key={f} style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:BOJE[f],flexShrink:0}} />
              <span style={{fontSize:12,width:148,flexShrink:0,color:"#aaa"}}>{f}</span>
              <input value={tempR[f]||""} onChange={e=>setTempR(p=>({...p,[f]:e.target.value}))}
                  type="number" placeholder="0" style={{...S.inp,flex:1,padding:"6px 10px"}} />
            </div>
          ))}
          {(()=>{
            const sum=FASCIKLE.reduce((a,f)=>a+(parseFloat(tempR[f])||0),0);
            const diff=ukupnaPlata-sum;
            if (!ukupnaPlata||diff===0) return null;
            return <div style={{fontSize:11,color:diff>0?"#7eb8a4":"#e08070",marginTop:6}}>
              {diff>0?`Ostaje: ${fmt(diff)}`:`Previše za: ${fmt(Math.abs(diff))}`}
            </div>;
          })()}
          <Btns onCancel={()=>setShowRaspored(false)} onOk={saveRaspored} okLabel="Sačuvaj" />
        </Modal>
      )}

      {/* Rashod */}
      {showTx && (
        <Modal title="Novi rashod" onClose={()=>setShowTx(false)}>
          <input value={tx.opis} onChange={e=>setTx(p=>({...p,opis:e.target.value}))}
              placeholder="Opis (npr. Maxi, struja...)" style={S.inp} />
          <input value={tx.iznos} onChange={e=>setTx(p=>({...p,iznos:e.target.value}))}
              type="number" placeholder="Iznos (RSD)" style={{...S.inp,marginTop:8}} />
          <select value={tx.f} onChange={e=>setTx(p=>({...p,f:e.target.value}))}
              style={{...S.inp,marginTop:8}}>
            {FASCIKLE.map(f=><option key={f}>{f}</option>)}
          </select>
          <Btns onCancel={()=>setShowTx(false)} onOk={addTx} okLabel="Dodaj" />
        </Modal>
      )}

      {/* Prebaci na stranu */}
      {showPrebaci && (
        <Modal title="Prebaci na stranu → Štednja" titleColor="#7eb8a4" onClose={()=>setShowPrebaci(false)}>
          <select value={preb.f} onChange={e=>setPreb(p=>({...p,f:e.target.value}))} style={S.inp}>
            {SVE_FASCIKLE.filter(f=>f!=="Štednja"&&(mesec.raspored[f]||0)>0).map(f=>(
              <option key={f} value={f}>{f} — ostalo: {fmt((mesec.raspored[f]||0)-(mesec.rashod[f]||0))}</option>
            ))}
          </select>
          <input value={preb.iznos} onChange={e=>setPreb(p=>({...p,iznos:e.target.value}))}
              type="number" placeholder="Iznos (RSD)" style={{...S.inp,marginTop:8}} />
          <Btns onCancel={()=>setShowPrebaci(false)} onOk={doPrebaciNaStranu} okLabel="Prebaci" okColor="#7eb8a4" />
        </Modal>
      )}

      {/* Zatvori nedelju */}
      {showZatvori && (
        <Modal title={`Zatvori ${showZatvori}?`} titleColor="#e08070" onClose={()=>setShowZatvori(null)}>
          <div style={{fontSize:13,color:"#888",lineHeight:1.6}}>
            Ostatak od <span style={{color:"#c8a96e",fontWeight:"bold"}}>{fmt((mesec.raspored[showZatvori]||0)-(mesec.rashod[showZatvori]||0))}</span> će biti prebačen u <span style={{color:"#5a8a7a"}}>Ostatak - {showZatvori}</span>.
            <br/><br/>Nedelja će biti označena kao zatvorena.
          </div>
          <Btns onCancel={()=>setShowZatvori(null)} onOk={()=>zatvoriNedelju(showZatvori)} okLabel="Zatvori nedelju" okColor="#e08070" />
        </Modal>
      )}

      {/* Obriši transakciju */}
      {showDelete!==null && (
        <Modal title="Obriši transakciju?" titleColor="#e08070" onClose={()=>setShowDelete(null)}>
          <div style={{fontSize:13,color:"#888",lineHeight:1.6}}>
            <span style={{color:"#e8e0d0"}}>{(mesec.transakcije||[])[showDelete]?.opis}</span>
            <br/>
            <span style={{color:"#e08070",fontWeight:"bold"}}>{fmt((mesec.transakcije||[])[showDelete]?.iznos)}</span>
            <br/><br/>
            Rashod će biti vraćen nazad u fasciklu.
          </div>
          <Btns onCancel={()=>setShowDelete(null)} onOk={()=>deleteTx(showDelete)} okLabel="Obriši" okColor="#e08070" />
        </Modal>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js');
    });
  }
</script>
</body>
</html>
