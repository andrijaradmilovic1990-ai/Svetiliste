<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Svetilište | Gospodin Niko</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0a0a0a;
            color: #d1d1d1;
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }
        .typewriter-font {
            font-family: 'Special+Elite', cursive;
        }
        .story-card {
            background: #121212;
            border: 1px solid #1f1f1f;
            transition: all 0.3s ease;
        }
        .story-card:hover {
            border-color: #444;
            transform: translateY(-2px);
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }
        .whitespace-pre-line {
            white-space: pre-line;
        }
        #mobile-menu {
            transition: transform 0.3s ease-in-out;
        }
        .music-player {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 9999; 
            background: rgba(18, 18, 18, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.75rem 1.25rem;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            cursor: pointer;
            pointer-events: auto;
        }
        .vinyl-spin {
            animation: spin 3s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        #player-status {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #666;
        }
    </style>
</head>
<body onload="window.scrollTo(0, 0);">

    <!-- Navigacija -->
    <nav class="fixed w-full z-[100] bg-black/90 backdrop-blur-md border-b border-white/5 px-6 py-4 flex justify-between items-center">
        <a href="#home" class="text-xl font-bold tracking-tighter typewriter-font text-white uppercase">SVETILIŠTE</a>
        <div class="space-x-8 text-sm uppercase tracking-widest hidden md:flex">
            <a href="#home" class="hover:text-white transition">Početna</a>
            <a href="#stories" class="hover:text-white transition">Priče</a>
            <a href="#about" class="hover:text-white transition">O Autoru</a>
        </div>
        <button id="menu-btn" class="md:hidden text-white focus:outline-none">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
            </svg>
        </button>
    </nav>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="fixed inset-0 z-[90] bg-black flex flex-col items-center justify-center space-y-8 text-2xl uppercase tracking-[0.3em] transform -translate-y-full md:hidden">
        <a href="#home" onclick="toggleMenu()" class="hover:text-white transition typewriter-font">Početna</a>
        <a href="#stories" onclick="toggleMenu()" class="hover:text-white transition typewriter-font">Priče</a>
        <a href="#about" onclick="toggleMenu()" class="hover:text-white transition typewriter-font">O Autoru</a>
        <button onclick="toggleMenu()" class="mt-8 text-gray-500 text-sm tracking-widest">Zatvori</button>
    </div>

    <!-- Audio Element -->
    <audio id="bg-audio" preload="auto" onended="sledecaPesma(event)"></audio>

    <!-- Muzički Plejer -->
    <div class="music-player">
        <div id="vinyl-icon" class="w-8 h-8 border-2 border-white/20 rounded-full flex items-center justify-center relative bg-zinc-900" onclick="toggleMuzika()">
            <div class="w-2 h-2 bg-white rounded-full"></div>
            <div class="absolute inset-0 border border-white/5 rounded-full"></div>
        </div>
        <div class="flex flex-col" onclick="toggleMuzika()">
            <span id="song-title" class="text-[10px] font-bold text-white leading-tight uppercase tracking-tighter">Učitavam...</span>
            <span id="player-status">Pritisni za ton</span>
        </div>
        <div class="flex items-center gap-2 ml-2 text-white">
            <div id="play-pause-icon" class="cursor-pointer hover:text-gray-300" onclick="toggleMuzika()">
                <svg id="play-svg" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"></path></svg>
                <svg id="pause-svg" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M5 4h3v12H5V4zm7 0h3v12h-3V4z"></path></svg>
            </div>
            <div class="cursor-pointer hover:text-gray-300" onclick="sledecaPesma(event)" title="Sledeća pesma">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M13 5v10l7-5-7-5zM4 5v10l7-5-7-5z"></path></svg>
            </div>
        </div>
    </div>

    <section id="home" class="h-screen flex items-center justify-center relative overflow-hidden px-6 text-center">
        <div class="z-10 max-w-3xl">
            <h1 class="text-5xl md:text-7xl font-bold text-white mb-6 typewriter-font">Tišina koja vrišti.</h1>
            <a href="#stories" class="inline-block border border-white px-8 py-3 text-sm uppercase tracking-widest hover:bg-white hover:text-black transition duration-300">Uđi u arhivu</a>
        </div>
    </section>

    <!-- Skraćeno za primer, zadrži svoje priče -->
    <section id="stories" class="py-24 px-6 max-w-7xl mx-auto">
        <h2 class="text-3xl font-bold text-white mb-12 border-l-4 border-white pl-4 typewriter-font">Arhiva</h2>
        <p class="text-gray-400 italic">Ovde su tvoji zapisi... (zadrži sadržaj iz prethodne verzije)</p>
    </section>

    <script>
        const playlista = [
            { naslov: "Creedence", fajl: "creedence.mp3?v=10" },
            { naslov: "Switchfoot - Dare You To Move (Alt. Version)", fajl: "dareyoutomove.mp3?v=10" }
        ];
        let trenutnaPesma = 0;
        let isPlaying = false;
        
        const audio = document.getElementById('bg-audio');
        const vinylIcon = document.getElementById('vinyl-icon');
        const playSvg = document.getElementById('play-svg');
        const pauseSvg = document.getElementById('pause-svg');
        const statusText = document.getElementById('player-status');
        const songTitle = document.getElementById('song-title');

        function ucitajPesmu() {
            const data = playlista[trenutnaPesma];
            audio.src = data.fajl;
            songTitle.innerText = data.naslov;
            statusText.innerText = "Spreman";
        }
        
        ucitajPesmu();

        function toggleMuzika() {
            if (!isPlaying) {
                statusText.innerText = "Učitavam...";
                audio.load();
                audio.play().then(() => {
                    playSvg.classList.add('hidden');
                    pauseSvg.classList.remove('hidden');
                    vinylIcon.classList.add('vinyl-spin');
                    statusText.innerText = "Sviram";
                    isPlaying = true;
                }).catch(error => {
                    statusText.innerText = "FAJL NIJE NAĐEN: " + playlista[trenutnaPesma].fajl.split('?')[0];
                    isPlaying = false;
                });
            } else {
                audio.pause();
                playSvg.classList.remove('hidden');
                pauseSvg.classList.add('hidden');
                vinylIcon.classList.remove('vinyl-spin');
                statusText.innerText = "Pauzirano";
                isPlaying = false;
            }
        }

        function sledecaPesma(e) {
            if(e) e.stopPropagation(); 
            trenutnaPesma = (trenutnaPesma + 1) % playlista.length;
            ucitajPesmu();
            if (isPlaying) toggleMuzika();
        }

        function toggleMenu() {
            const mobileMenu = document.getElementById('mobile-menu');
            mobileMenu.classList.toggle('-translate-y-full');
            mobileMenu.classList.toggle('translate-y-0');
        }
        document.getElementById('menu-btn').addEventListener('click', toggleMenu);
    </script>
</body>
</html>
